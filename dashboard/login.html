<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Indibiz ML Dashboard</title>
  <link rel="stylesheet" href="style.css">
  
  <script>
    // Inisialisasi tema instan sebelum body dirender untuk mencegah screen flash
    (function initTheme() {
      const saved = localStorage.getItem('app_theme');
      const activeTheme = saved || 'light';
      if (activeTheme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      } else {
        document.documentElement.removeAttribute('data-theme');
      }
    })();
  </script>

  <style>
    /* =====================================================
       Responsive & Fluid Login Layout (Berdasarkan Breakpoint)
       ===================================================== */
    
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: var(--bg-primary);
      margin: 0;
      font-family: 'Inter', sans-serif;
      transition: background 0.4s ease, color 0.4s ease;
      box-sizing: border-box;
      padding: 1rem;
    }
    
    .login-container {
      width: 100%;
      margin: 0 auto;
      transition: max-width 0.3s ease;
    }
    
    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 1rem;
      box-shadow: var(--shadow-card);
      position: relative;
      overflow: hidden;
      transition: background 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease, padding 0.3s ease;
    }
    
    /* Background light glow effect */
    .login-card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(204, 0, 0, 0.04) 0%, transparent 60%);
      pointer-events: none;
    }
    
    /* Floating theme switcher positioned inside the card to prevent overlap on mobile */
    .theme-toggle-container {
      position: absolute;
      top: 1.25rem;
      right: 1.25rem;
      z-index: 10;
    }
    
    .login-header {
      text-align: center;
      margin-bottom: 2rem;
      position: relative;
      z-index: 1;
    }
    
    .login-logo {
      height: auto;
      margin-bottom: 1rem;
      transition: width 0.3s ease;
    }
    
    .login-title {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      color: var(--text-primary);
      margin: 0 0 0.5rem 0;
      line-height: 1.2;
      transition: color 0.4s ease, font-size 0.3s ease;
    }
    
    .login-subtitle {
      color: var(--text-muted);
      margin: 0;
      line-height: 1.4;
      transition: color 0.4s ease, font-size 0.3s ease;
    }
    
    .form-group {
      margin-bottom: 1.5rem;
      position: relative;
      z-index: 1;
    }
    
    .form-label {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      transition: color 0.4s ease;
    }
    
    .form-input {
      width: 100%;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      color: var(--text-primary);
      font-size: 0.875rem;
      box-sizing: border-box;
      transition: all 0.3s ease;
    }
    
    .form-input:focus {
      outline: none;
      border-color: var(--telkom-red);
      box-shadow: 0 0 8px var(--border-glow);
    }
    
    .btn-login {
      width: 100%;
      background: var(--gradient-telkom);
      border: none;
      border-radius: 0.5rem;
      color: #FFFFFF;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: var(--shadow-red);
      margin-top: 0.5rem;
      position: relative;
      z-index: 1;
      box-sizing: border-box;
    }
    
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(204, 0, 0, 0.4);
    }
    
    .btn-login:active {
      transform: translateY(0);
    }
    
    .btn-login:disabled {
      background: var(--border);
      color: var(--text-muted);
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }
    
    .error-alert {
      background: rgba(204, 0, 0, 0.08);
      border: 1px solid rgba(204, 0, 0, 0.25);
      color: var(--telkom-red);
      border-radius: 0.5rem;
      padding: 0.75rem 1rem;
      font-size: 0.8125rem;
      margin-bottom: 1.5rem;
      display: none;
      animation: fadeIn 0.3s ease;
      position: relative;
      z-index: 1;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .login-footer {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.75rem;
      color: var(--text-muted);
      position: relative;
      z-index: 1;
      transition: color 0.4s ease;
    }

    /* =====================================================
       Breakpoint-specific responsive rules (Desktop, Tablet, Mobile)
       ===================================================== */

    /* ─── DESKTOP (Width > 1024px) ─── */
    @media (min-width: 1025px) {
      .login-container {
        max-width: 450px;
      }
      .login-card {
        padding: 3.5rem 3rem;
      }
      .login-logo {
        width: 150px;
      }
      .login-title {
        font-size: 1.5rem;
      }
      .login-subtitle {
        font-size: 0.875rem;
      }
      .form-input {
        padding: 0.85rem 1.15rem;
      }
      .btn-login {
        padding: 0.95rem;
        font-size: 0.9rem;
      }
    }

    /* ─── TABLET (Width 640px - 1024px) ─── */
    @media (min-width: 640px) and (max-width: 1024px) {
      .login-container {
        max-width: 410px;
      }
      .login-card {
        padding: 3rem 2.25rem;
      }
      .login-logo {
        width: 135px;
      }
      .login-title {
        font-size: 1.35rem;
      }
      .login-subtitle {
        font-size: 0.825rem;
      }
      .form-input {
        padding: 0.775rem 1.05rem;
      }
      .btn-login {
        padding: 0.875rem;
        font-size: 0.875rem;
      }
    }

    /* ─── MOBILE (Width < 640px) ─── */
    @media (max-width: 639px) {
      body {
        padding: 0.75rem;
      }
      .login-container {
        width: 100%;
        max-width: 100%;
      }
      .login-card {
        padding: 2.25rem 1.25rem;
        border-radius: 0.75rem;
      }
      .theme-toggle-container {
        top: 0.875rem;
        right: 0.875rem;
      }
      .login-logo {
        width: 115px;
      }
      .login-title {
        font-size: 1.2rem;
      }
      .login-subtitle {
        font-size: 0.75rem;
      }
      .form-input {
        padding: 0.7rem 0.9rem;
        font-size: 0.8125rem;
      }
      .btn-login {
        padding: 0.8rem;
        font-size: 0.8125rem;
      }
      .form-group {
        margin-bottom: 1.25rem;
      }
    }
  </style>
</head>
<body class="login-page">

<div class="login-container">
  <div class="login-card">
    <!-- Floating Theme Switcher Inside Card -->
    <div class="theme-toggle-container">
      <div class="theme-widget" id="themeWidget" onclick="toggleTheme()" title="Ganti Tema">
        <svg class="theme-widget-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
        <div class="theme-widget-track">
          <div class="theme-widget-thumb" id="themeThumb"></div>
        </div>
        <svg class="theme-widget-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
        <span class="theme-widget-label" id="themeLabel">Light</span>
      </div>
    </div>

    <div class="login-header">
      <img src="indibiz_logo.png" alt="Indibiz" class="login-logo">
      <h1 class="login-title">Machine Learning Dashboard</h1>
      <p class="login-subtitle">Silakan login untuk mengakses dashboard prediksi</p>
    </div>

    <div class="error-alert" id="errorAlert">Username atau password salah.</div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input type="text" id="username" class="form-input" required placeholder="Masukkan username" autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" id="password" class="form-input" required placeholder="Masukkan password" autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login" id="submitBtn">MASUK KE DASHBOARD</button>
    </form>

    <div class="login-footer">
      &copy; 2026 Telkom Indonesia &middot; Keperluan Skripsi SMT 8
    </div>
  </div>
</div>

<script>
  // Fungsi ubah tema
  function toggleTheme() {
    const html = document.documentElement;
    const label = document.getElementById('themeLabel');
    const isDark = html.getAttribute('data-theme') === 'dark';

    if (isDark) {
      html.removeAttribute('data-theme');
      if (label) label.textContent = 'Light';
      localStorage.setItem('app_theme', 'light');
    } else {
      html.setAttribute('data-theme', 'dark');
      if (label) label.textContent = 'Dark';
      localStorage.setItem('app_theme', 'dark');
    }
  }

  // Sinkronisasi teks label tema saat halaman pertama dimuat
  (function syncThemeWidget() {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    const label = document.getElementById('themeLabel');
    if (label) {
      label.textContent = isDark ? 'Dark' : 'Light';
    }
  })();

  // Handler Login API
  async function handleLogin(e) {
    e.preventDefault();
    const usernameInput = document.getElementById('username').value;
    const passwordInput = document.getElementById('password').value;
    const errorAlert = document.getElementById('errorAlert');
    const submitBtn = document.getElementById('submitBtn');

    errorAlert.style.display = 'none';
    submitBtn.disabled = true;
    submitBtn.textContent = 'MEMPROSES...';

    try {
      const response = await fetch('/api/login', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          username: usernameInput,
          password: passwordInput
        })
      });

      const data = await response.json();

      if (response.ok && data.success) {
        // Redirect ke dashboard utama
        window.location.href = '/';
      } else {
        errorAlert.textContent = data.message || 'Username atau password salah';
        errorAlert.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'MASUK KE DASHBOARD';
      }
    } catch (err) {
      console.error(err);
      errorAlert.textContent = 'Terjadi kesalahan koneksi ke server.';
      errorAlert.style.display = 'block';
      submitBtn.disabled = false;
      submitBtn.textContent = 'MASUK KE DASHBOARD';
    }
  }
</script>

</body>
</html>
