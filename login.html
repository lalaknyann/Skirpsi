<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Indibiz ML Dashboard</title>
  <link rel="stylesheet" href="style.css">
  
  <script>
    // Inisialisasi tema instan sebelum body dirender untuk mencegah flash putih/hitam
    (function initTheme() {
      const saved = localStorage.getItem('indibiz-theme');
      // Default ke light mode jika belum ada preferensi tersimpan
      const activeTheme = saved || 'light';
      if (activeTheme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      } else {
        document.documentElement.removeAttribute('data-theme');
      }
    })();
  </script>

  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: var(--bg-primary);
      margin: 0;
      font-family: 'Inter', sans-serif;
      position: relative;
      transition: background 0.4s ease, color 0.4s ease;
    }
    
    /* Container for floating theme toggle */
    .theme-toggle-container {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 10;
    }
    
    .login-container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }
    
    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 45px 35px;
      box-shadow: var(--shadow-card);
      position: relative;
      overflow: hidden;
      transition: background 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
    }
    
    .login-card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(204, 0, 0, 0.05) 0%, transparent 60%);
      pointer-events: none;
    }
    
    .login-header {
      text-align: center;
      margin-bottom: 32px;
      position: relative;
      z-index: 1;
    }
    
    .login-logo {
      width: 140px;
      max-width: 100%;
      height: auto;
      margin-bottom: 16px;
      transition: filter 0.3s ease;
    }
    
    .login-title {
      font-family: 'Outfit', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
      transition: color 0.4s ease;
    }
    
    .login-subtitle {
      font-size: 13px;
      color: var(--text-muted);
      transition: color 0.4s ease;
    }
    
    .form-group {
      margin-bottom: 22px;
      position: relative;
      z-index: 1;
    }
    
    .form-label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-secondary);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      transition: color 0.4s ease;
    }
    
    .form-input {
      width: 100%;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      color: var(--text-primary);
      font-size: 14px;
      transition: all 0.3s ease;
    }
    
    .form-input:focus {
      outline: none;
      border-color: var(--telkom-red);
      box-shadow: 0 0 8px var(--border-glow);
    }
    
    .btn-login {
      width: 100%;
      background: var(--gradient-telkom);
      border: none;
      border-radius: 8px;
      padding: 14px;
      color: #FFFFFF;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: var(--shadow-red);
      margin-top: 10px;
      position: relative;
      z-index: 1;
    }
    
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(204, 0, 0, 0.4);
    }
    
    .btn-login:active {
      transform: translateY(0);
    }
    
    .btn-login:disabled {
      background: var(--border);
      color: var(--text-muted);
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }
    
    .error-alert {
      background: rgba(204, 0, 0, 0.1);
      border: 1px solid rgba(204, 0, 0, 0.25);
      color: var(--telkom-red);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      margin-bottom: 22px;
      display: none;
      animation: fadeIn 0.3s ease;
      position: relative;
      z-index: 1;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .login-footer {
      text-align: center;
      margin-top: 28px;
      font-size: 11px;
      color: var(--text-muted);
      position: relative;
      z-index: 1;
      transition: color 0.4s ease;
    }

    /* ─── MEDIA QUERY RESPONSIVE ─── */
    @media (max-width: 480px) {
      .theme-toggle-container {
        top: 15px;
        right: 15px;
      }
      .login-container {
        padding: 15px;
      }
      .login-card {
        padding: 35px 20px;
        border-radius: 12px;
      }
      .login-title {
        font-size: 19px;
      }
      .form-input {
        padding: 11px 14px;
        font-size: 13px;
      }
      .btn-login {
        padding: 12px;
        font-size: 13px;
      }
    }
  </style>
</head>
<body>

<!-- Floating Theme Switcher -->
<div class="theme-toggle-container">
  <div class="theme-widget" id="themeWidget" onclick="toggleTheme()" title="Ganti Tema">
    <span class="theme-widget-icon">&#x2600;&#xFE0F;</span>
    <div class="theme-widget-track">
      <div class="theme-widget-thumb" id="themeThumb"></div>
    </div>
    <span class="theme-widget-icon">&#x1F319;</span>
    <span class="theme-widget-label" id="themeLabel">Light</span>
  </div>
</div>

<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <img src="indibiz_logo.png" alt="Indibiz" class="login-logo">
      <div class="login-title">Machine Learning Dashboard</div>
      <div class="login-subtitle">Silakan login untuk mengakses dashboard prediksi</div>
    </div>

    <div class="error-alert" id="errorAlert">Username atau password salah.</div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input type="text" id="username" class="form-input" required placeholder="Masukkan username" autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" id="password" class="form-input" required placeholder="Masukkan password" autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login" id="submitBtn">MASUK KE DASHBOARD</button>
    </form>

    <div class="login-footer">
      &copy; 2026 Telkom Indonesia &middot; Keperluan Skripsi SMT 8
    </div>
  </div>
</div>

<script>
  // Fungsi ubah tema
  function toggleTheme() {
    const html = document.documentElement;
    const label = document.getElementById('themeLabel');
    const isDark = html.getAttribute('data-theme') === 'dark';

    if (isDark) {
      html.removeAttribute('data-theme');
      if (label) label.textContent = 'Light';
      localStorage.setItem('indibiz-theme', 'light');
    } else {
      html.setAttribute('data-theme', 'dark');
      if (label) label.textContent = 'Dark';
      localStorage.setItem('indibiz-theme', 'dark');
    }
  }

  // Sinkronisasi teks label tema saat halaman pertama dimuat
  (function syncThemeWidget() {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    const label = document.getElementById('themeLabel');
    if (label) {
      label.textContent = isDark ? 'Dark' : 'Light';
    }
  })();

  // Handler Login API
  async function handleLogin(e) {
    e.preventDefault();
    const usernameInput = document.getElementById('username').value;
    const passwordInput = document.getElementById('password').value;
    const errorAlert = document.getElementById('errorAlert');
    const submitBtn = document.getElementById('submitBtn');

    errorAlert.style.display = 'none';
    submitBtn.disabled = true;
    submitBtn.textContent = 'MEMPROSES...';

    try {
      const response = await fetch('/api/login', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          username: usernameInput,
          password: passwordInput
        })
      });

      const data = await response.json();

      if (response.ok && data.success) {
        // Simpan token di sessionStorage
        sessionStorage.setItem('auth_token', data.token);
        
        // Redirect ke dashboard utama
        window.location.href = '/';
      } else {
        errorAlert.textContent = data.message || 'Username atau password salah';
        errorAlert.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'MASUK KE DASHBOARD';
      }
    } catch (err) {
      console.error(err);
      errorAlert.textContent = 'Terjadi kesalahan koneksi ke server.';
      errorAlert.style.display = 'block';
      submitBtn.disabled = false;
      submitBtn.textContent = 'MASUK KE DASHBOARD';
    }
  }
</script>

</body>
</html>
